<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOTA IDE — STM8L152C6T6</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>⚡ FOTA IDE</h1>
  <span class="chip">STM8L152C6T6</span>
  <span class="chip">Bootloader @ 0x8000</span>
  <span class="chip">App @ 0x8400</span>
  <div class="header-right">
    <div class="status-dot" id="esp32-dot"></div>
    <span class="status-text" id="esp32-status">ESP32 chưa kết nối</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn btn-build" onclick="buildCode()" id="btn-build">
    🔨 Build
  </button>
  <button class="btn btn-flash" onclick="flashOnly()" id="btn-flash" disabled>
    ⚡ Flash
  </button>
  <button class="btn btn-both" onclick="buildAndFlash()" id="btn-both">
    🚀 Build & Flash
  </button>
  <div class="sep"></div>
  <input class="file-name-input" id="filename" value="app_fota.bin" placeholder="ten_file.bin">
  <div class="sep"></div>
  <button class="btn btn-clear" onclick="clearAll()">🗑 Clear</button>
  <div class="build-info" id="build-info">Chưa build</div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="panel-header">
      <div class="dot" style="background:#f85149"></div>
      <div class="dot" style="background:#e3b341"></div>
      <div class="dot" style="background:#3fb950"></div>
      <span style="margin-left:4px">app.c — STM8L152C6T6 Application</span>
    </div>
    <div id="editor"></div>
  </div>

  <!-- RESIZE -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="right-panel">

    <!-- Build Output -->
    <div class="output-header">
      <div class="dot" style="background:#e3b341;width:6px;height:6px;border-radius:50%"></div>
      Build Output
    </div>
    <div id="build-output">
      <span class="log-dim">// Bam "Build" de bien dich code C thanh file .bin</span>
    </div>

    <!-- Flash Log -->
    <div class="flash-header">
      <div class="dot" style="background:#58a6ff;width:6px;height:6px;border-radius:50%"></div>
      Flash Log — ESP32 FOTA Gateway
    </div>
    <div id="flash-log">
      <span class="log-dim">// Log nap firmware tu ESP32 hien thi o day</span>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">Sẵn sàng</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>

  </div>
</div>

<!-- Monaco Editor loader (phải nạp TRƯỚC script.js vì script.js dùng require) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script src="script.js"></script>
</body>
</html>
